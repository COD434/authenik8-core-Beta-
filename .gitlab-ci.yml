workflow:
  # Create pipelines for every branch/tag push and every merge request.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: never

stages:
  - lint
  - test
  - security
  - build
  - publish

include:
  # Official GitLab security templates.
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml

variables:
  # Keep npm cache inside the project directory so GitLab can cache it.
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  NPM_CONFIG_FUND: "false"
  # Security audit runs in its own job, so skip the install-time audit for speed.
  NPM_CONFIG_AUDIT: "false"
  # Shared Redis settings for CI jobs that talk to the Redis service container.
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_URL: "redis://redis:6379/15"
  # Namespace test data so concurrent pipelines do not collide in Redis.
  AUTHENIK8_TEST_NAMESPACE: "ci:${CI_PIPELINE_ID}:${CI_JOB_ID}"
  # Reduce noise and scanning time for generated content.
  SAST_EXCLUDED_PATHS: "dist,coverage,node_modules"

default:
  image: node:20-bookworm
  interruptible: true
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull-push
  before_script:
    - node --version
    - npm --version
    - npm ci --prefer-offline

lint:
  stage: lint
  script:
    - npm run lint
    - npm run typecheck

test:unit:
  
  stage: test
  script:
    - mkdir -p reports/unit coverage/unit
    - npm run test:unit:ci
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/unit/
      - coverage/unit/
    reports:
      junit: reports/unit/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/unit/cobertura-coverage.xml

test:integration:
  
  stage: test
  services:
    - name: redis:7-alpine
      alias: redis
  script:
    - mkdir -p reports/integration coverage/integration
    - |
      node <<'EOF'
      const Redis = require('ioredis');

      const host = process.env.REDIS_HOST || 'redis';
      const port = Number(process.env.REDIS_PORT || '6379');
      const deadline = Date.now() + 30000;
      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      (async () => {
        while (Date.now() < deadline) {
          const client = new Redis({
            host,
            port,
            lazyConnect: true,
            enableReadyCheck: true,
            maxRetriesPerRequest: 1,
            retryStrategy: null,
          });

          try {
            await client.connect();
            const pong = await client.ping();
            await client.quit();

            if (pong === 'PONG') {
              console.log(`Redis is ready at ${host}:${port}`);
              process.exit(0);
            }
          } catch (error) {
            try {
              client.disconnect();
            } catch (_) {
              // Nothing else to do here; the next loop iteration retries.
            }
          }

          await sleep(1000);
        }

        console.error(`Redis was not ready at ${host}:${port} within 30 seconds`);
        process.exit(1);
      })();
      EOF
    - npm run test:integration:ci
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/integration/
      - coverage/integration/
    reports:
      junit: reports/integration/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/integration/cobertura-coverage.xml

test:matrix:

  stage: test
  parallel:
    matrix:
      - NODE_VERSION: ["18", "20", "22"]
  image: node:${NODE_VERSION}-bookworm
  script:
    - npm run test:matrix

security:

  stage: security
  script:
    - mkdir -p reports/security
    - npm audit --audit-level=high --json > reports/security/npm-audit.json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/security/npm-audit.json

build:
  stage: build
  script:
    - npm run build
  artifacts:
    expire_in: 1 week
    paths:
      - dist/

publish:
  # npm trusted publishing with Sigstore provenance requires GitLab OIDC and
  # a modern npm CLI. Use Node 22 here even though the rest of the pipeline
  # defaults to Node 20.
  stage: publish
  image: node:22-bookworm
  interruptible: false
  resource_group: npm-publish
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  needs:
    - job: build
      artifacts: true
  before_script:
    - node --version
    - npm --version
    - npm install --global npm@^11.5.1
    - npm --version
  script:
    - npm publish --provenance --access public
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
    - when: never
